<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>PPO Snake Vetorizado</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
  canvas { background: #000; border: 1px solid #444; image-rendering: pixelated; }
  #info { margin-top: 10px; white-space: pre; }
  button { padding: 8px 16px; margin-right: 8px; }
</style>
</head>
<body>
<canvas id="cv" width="300" height="300"></canvas>
<div id="info">Iniciando...</div>
<div style="margin-top:10px;">
  <button id="btnRapido">Modo rapido (sem render)</button>
  <button id="btnNormal">Modo normal</button>
  <button id="btnSalvar">Salvar modelo</button>
  <button id="btnAval">Avaliar (greedy)</button>
</div>

<script src="modulos/matriz.js"></script>
<script src="modulos/ativacoes.js"></script>
<script src="modulos/inicializador.js"></script>
<script src="modulos/rede.js"></script>
<script src="modulos/adam.js"></script>
<script src="modulos/normalizador.js"></script>
<script src="modulos/distribuicoes.js"></script>
<script src="modulos/buffer.js"></script>
<script src="ppo.js"></script>
<script>
const TAM = 15, CEL = 20;
const N_AMBS = 16;
const PASSOS_POR_AMB = 128;

const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const info = document.getElementById("info");

class Snake {
  constructor() { this.reset(); }
  reset() {
    this.cobra = [{x:7,y:7}];
    this.dir = {x:1,y:0};
    this.spawnComida();
    this.semComer = 0;
    return this.estado();
  }
  spawnComida() {
    while (true) {
      const c = {x: Math.floor(Math.random()*TAM), y: Math.floor(Math.random()*TAM)};
      if (!this.cobra.some(s => s.x===c.x && s.y===c.y)) { this.comida = c; return; }
    }
  }
  estado() {
    const cab = this.cobra[0];
    const fr = this.dir;
    const esq = {x:fr.y, y:-fr.x};
    const dir = {x:-fr.y, y:fr.x};
    const perigo = (d) => {
      const nx = cab.x+d.x, ny = cab.y+d.y;
      if (nx<0||ny<0||nx>=TAM||ny>=TAM) return 1;
      if (this.cobra.some(s => s.x===nx && s.y===ny)) return 1;
      return 0;
    };
    const dx = this.comida.x - cab.x, dy = this.comida.y - cab.y;
    return [
      perigo(fr), perigo(dir), perigo(esq),
      fr.x, fr.y,
      Math.sign(dx), Math.sign(dy),
      dx/TAM, dy/TAM,
      this.cobra.length / (TAM*TAM)
    ];
  }
  passo(acao) {
    if (acao === 1) this.dir = {x:-this.dir.y, y:this.dir.x};
    else if (acao === 2) this.dir = {x:this.dir.y, y:-this.dir.x};
    const cab = this.cobra[0];
    const distAnt = Math.abs(cab.x-this.comida.x) + Math.abs(cab.y-this.comida.y);
    const nova = {x:cab.x+this.dir.x, y:cab.y+this.dir.y};
    this.semComer++;
    if (nova.x<0||nova.y<0||nova.x>=TAM||nova.y>=TAM ||
        this.cobra.some(s => s.x===nova.x && s.y===nova.y)) {
      return { est: this.estado(), rec: -1, fim: true };
    }
    this.cobra.unshift(nova);
    let rec = 0;
    if (nova.x===this.comida.x && nova.y===this.comida.y) {
      rec = 1; this.semComer = 0; this.spawnComida();
    } else {
      this.cobra.pop();
      const distNov = Math.abs(nova.x-this.comida.x) + Math.abs(nova.y-this.comida.y);
      rec = (distAnt - distNov) * 0.05 - 0.005;
    }
    if (this.semComer > 100) return { est: this.estado(), rec: -0.5, fim: true };
    return { est: this.estado(), rec, fim: false };
  }
}

const ag = new PPO({
  nEst: 10, nAcoes: 3, nHid: 64,
  nAmbientes: N_AMBS,
  lr: 3e-4, gama: 0.99, lam: 0.95, eps: 0.2,
  entCoef: 0.01, vCoef: 0.5,
  epocas: 10, tamLote: 128, klAlvo: 0.02,
  normObs: true, normRec: true
});

const envs = Array.from({ length: N_AMBS }, () => new Snake());
let ests = envs.map(e => e.reset());

let ep = 0, hist = [], recorde = 0, ultStats = null;
let renderiza = true;
let mostraGreedy = false;
let idxRender = 0;

function desenha() {
  ctx.fillStyle = "#000"; ctx.fillRect(0,0,cv.width,cv.height);
  const env = envs[idxRender];
  ctx.fillStyle = mostraGreedy ? "#0ff" : "#0f0";
  for (const s of env.cobra) ctx.fillRect(s.x*CEL, s.y*CEL, CEL-1, CEL-1);
  ctx.fillStyle = "#f00";
  ctx.fillRect(env.comida.x*CEL, env.comida.y*CEL, CEL-1, CEL-1);
}

function atualizaInfo() {
  const med = hist.length ? hist.reduce((a,b)=>a+b,0)/hist.length : 0;
  const passosColetados = ag.atualizacao * PASSOS_POR_AMB * N_AMBS;
  let txt = `Ambientes: ${N_AMBS}\nEpisodios: ${ep}\nRecorde: ${recorde}\nMedia(100): ${med.toFixed(2)}\nAtualizacoes: ${ag.atualizacao}\nPassos totais: ${passosColetados}`;
  if (ultStats) txt += `\nKL: ${ultStats.klMed.toFixed(4)} | LossA: ${ultStats.lossA.toFixed(4)} | LossC: ${ultStats.lossC.toFixed(4)} | Ent: ${ultStats.ent.toFixed(3)} | Epocas: ${ultStats.epocas}`;
  info.textContent = txt;
}

function passoSimulacao() {
  const treinando = !mostraGreedy;
  const res = ag.agirLote(ests, treinando);
  for (let i = 0; i < N_AMBS; i++) {
    const r = envs[i].passo(res[i].acao);
    if (treinando) ag.lembrar(i, res[i].estProc, res[i].acao, res[i].logP, res[i].val, r.rec, r.fim);
    if (r.fim) {
      ep++;
      const tam = envs[i].cobra.length;
      if (tam > recorde) recorde = tam;
      hist.push(tam);
      if (hist.length > 100) hist.shift();
      ests[i] = envs[i].reset();
    } else {
      ests[i] = r.est;
    }
  }

  if (treinando && ag.bufferCheio(PASSOS_POR_AMB)) {
    const valsFinal = new Float32Array(N_AMBS);
    const resF = ag.agirLote(ests, false);
    for (let i = 0; i < N_AMBS; i++) valsFinal[i] = resF[i].val;
    ultStats = ag.treinar(valsFinal);
    atualizaInfo();
  }
}

function loop() {
  const passosFrame = renderiza ? 1 : 20;
  for (let k = 0; k < passosFrame; k++) passoSimulacao();
  if (renderiza) { desenha(); atualizaInfo(); }
  requestAnimationFrame(loop);
}

document.getElementById("btnRapido").onclick = () => renderiza = false;
document.getElementById("btnNormal").onclick = () => renderiza = true;
document.getElementById("btnAval").onclick = () => mostraGreedy = !mostraGreedy;
document.getElementById("btnSalvar").onclick = () => {
  const blob = new Blob([ag.salvar()], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "modelo-snake.json";
  a.click();
};

loop();
</script>
</body>
</html>
