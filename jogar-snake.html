<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Snake - Jogar</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  canvas { background: #000; border: 1px solid #444; image-rendering: pixelated; }
  #info { margin-top: 10px; font-size: 18px; }
  #ctrl { margin-top: 10px; color: #888; font-size: 13px; text-align: center; }
  button { padding: 8px 16px; margin-top: 10px; font-family: monospace; }
  #msgFim { position: absolute; color: #fff; font-size: 24px; text-shadow: 2px 2px #000; pointer-events: none; }
</style>
</head>
<body>
<canvas id="cv" width="450" height="450"></canvas>
<div id="info">Pontos: 0 | Recorde: 0</div>
<div id="ctrl">Setas ou WASD pra mover | Espaco pra reiniciar | P pra pausar</div>
<button id="btnReset">Reiniciar</button>

<script>
const TAM = 15, CEL = 30;
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const info = document.getElementById("info");

let cobra, dir, dirProx, comida, semComer, fim, pausado, pontos, recorde;
recorde = parseInt(localStorage.getItem("snakeRec") || "0");

function reset() {
  cobra = [{x:7,y:7}, {x:6,y:7}, {x:5,y:7}];
  dir = {x:1,y:0};
  dirProx = {x:1,y:0};
  semComer = 0;
  fim = false;
  pausado = false;
  pontos = 0;
  spawnComida();
  atualizaInfo();
}

function spawnComida() {
  while (true) {
    const c = {x: Math.floor(Math.random()*TAM), y: Math.floor(Math.random()*TAM)};
    if (!cobra.some(s => s.x===c.x && s.y===c.y)) { comida = c; return; }
  }
}

function passo() {
  if (fim || pausado) return;
  if (dirProx.x !== -dir.x || dirProx.y !== -dir.y) dir = dirProx;
  const cab = cobra[0];
  const nova = {x: cab.x + dir.x, y: cab.y + dir.y};
  semComer++;
  if (nova.x < 0 || nova.y < 0 || nova.x >= TAM || nova.y >= TAM ||
      cobra.some(s => s.x === nova.x && s.y === nova.y)) {
    fim = true;
    if (pontos > recorde) {
      recorde = pontos;
      localStorage.setItem("snakeRec", String(recorde));
    }
    atualizaInfo();
    return;
  }
  cobra.unshift(nova);
  if (nova.x === comida.x && nova.y === comida.y) {
    pontos++;
    semComer = 0;
    spawnComida();
  } else {
    cobra.pop();
  }
  if (semComer > 200) { fim = true; atualizaInfo(); return; }
  atualizaInfo();
}

function atualizaInfo() {
  let txt = `Pontos: ${pontos} | Recorde: ${recorde}`;
  if (pausado) txt += " | PAUSADO";
  if (fim) txt += " | FIM (espaco pra reiniciar)";
  info.textContent = txt;
}

function desenha() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, cv.width, cv.height);

  ctx.strokeStyle = "#1a1a1a";
  ctx.lineWidth = 1;
  for (let i = 0; i <= TAM; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CEL, 0); ctx.lineTo(i * CEL, cv.height); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CEL); ctx.lineTo(cv.width, i * CEL); ctx.stroke();
  }

  ctx.fillStyle = "#f00";
  ctx.fillRect(comida.x * CEL + 2, comida.y * CEL + 2, CEL - 4, CEL - 4);

  for (let i = 0; i < cobra.length; i++) {
    const s = cobra[i];
    ctx.fillStyle = i === 0 ? "#0f0" : "#0a0";
    ctx.fillRect(s.x * CEL + 1, s.y * CEL + 1, CEL - 2, CEL - 2);
  }

  if (fim) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, cv.height/2 - 40, cv.width, 80);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 28px monospace";
    ctx.textAlign = "center";
    ctx.fillText("FIM DE JOGO", cv.width/2, cv.height/2);
    ctx.font = "14px monospace";
    ctx.fillText("Pressione ESPACO", cv.width/2, cv.height/2 + 25);
  }
}

document.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k === "arrowup" || k === "w") dirProx = {x:0, y:-1};
  else if (k === "arrowdown" || k === "s") dirProx = {x:0, y:1};
  else if (k === "arrowleft" || k === "a") dirProx = {x:-1, y:0};
  else if (k === "arrowright" || k === "d") dirProx = {x:1, y:0};
  else if (k === " ") { if (fim) reset(); e.preventDefault(); }
  else if (k === "p") { pausado = !pausado; atualizaInfo(); }
});

document.getElementById("btnReset").onclick = reset;

reset();
setInterval(passo, 100);
function loopRender() { desenha(); requestAnimationFrame(loopRender); }
loopRender();
</script>
</body>
</html>
